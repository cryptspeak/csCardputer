[env:standalone_915]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 8MB
board_build.partitions = partitions_8MB_ota.csv
board_upload.flash_size = 8MB

build_flags =
    -std=gnu++17
    -fexceptions
    -DRSCARDPUTER_STANDALONE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DRNS_USE_FS
    -DRNS_PERSIST_PATHS
    -DMSGPACK_USE_BOOST=OFF
    -DDEBUGLOG_DEFAULT_LOG_LEVEL_ERROR
    ; Endpoint node — balanced for ~55KB free heap (8-bit canvas saves 32KB)
    -DRNS_KNOWN_DESTINATIONS_MAX=48
    -DRNS_HASHLIST_MAX=32
    -DRNS_RECEIPTS_MAX=8
    -DRNS_QUEUED_ANNOUNCES_MAX=8
    -DRNS_RANDOM_BLOBS_MAX=8
    -DRNS_RANDOM_BLOBS_PERSIST_MAX=4
    -DRNS_RATE_TIMESTAMPS_MAX=4
    -DRNS_PR_TAGS_MAX=8

build_unflags =
    -fno-exceptions
    -std=gnu++11

; Pinned to 0x00001312/microReticulum (a personal fork of ratspeak's, kept
; in sync) instead of ratspeak/microReticulum directly, so LXMF stamp/field
; support (LXMFMessage.{h,cpp}) can live as a real upstream commit there
; rather than a local patch.
lib_deps =
    https://github.com/0x00001312/microReticulum.git#a71a676
    bblanchon/ArduinoJson@^7.4.2
    hideakitai/MsgPack@0.4.2  ; transitive dep pulled in via microReticulum's
                              ; library.json — explicit here to pin its version
    m5stack/M5Unified@0.2.13
    m5stack/M5GFX@0.2.19
    m5stack/M5Cardputer@1.1.1

extra_scripts = post:merge_firmware.py

monitor_speed = 115200
upload_speed = 460800
upload_flags = --no-stub
upload_protocol = esptool
